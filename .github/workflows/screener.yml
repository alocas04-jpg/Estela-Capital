name: Screener Moats — Estela Capital

on:
  schedule:
    # Cada lunes a las 08:00 Madrid (UTC+2 en verano = 06:00 UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar screener
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python screener.py --cloud

      - name: Publicar dashboard en GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html || true
          git diff --cached --quiet || git commit -m "dashboard: update $(date -u +'%Y-%m-%d')"
          git push origin HEAD

      - name: Subir Excel como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-output-${{ github.run_id }}
          path: output/screener_output_*.xlsx
          retention-days: 30
